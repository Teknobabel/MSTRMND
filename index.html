<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1, user-scalable=no"
    />
    <meta name="theme-color" content="#1a1a1e" />
    <title>Mastermind</title>
    <link rel="stylesheet" href="/src/styles.css" />
  </head>
  <body>
    <div id="app" class="app-root">
      <section id="screen-main" class="screen screen-main" aria-labelledby="main-title">
        <h1 id="main-title" class="screen-title">Mastermind</h1>
        <div class="screen-actions">
          <button type="button" class="btn btn-primary" id="btn-play">Play</button>
          <button type="button" class="btn" id="btn-main-settings">Settings</button>
        </div>
      </section>

      <section id="screen-settings" class="screen screen-settings" hidden aria-hidden="true">
        <h2 class="screen-title">Settings</h2>
        <div class="screen-actions">
          <button type="button" class="btn" id="btn-settings-back">Back</button>
        </div>
      </section>

      <section id="screen-game" class="screen screen-game" hidden aria-hidden="true">
        <canvas id="game-canvas" class="game-canvas" aria-label="Game canvas"></canvas>
        <div class="game-ui-layer">
        <div class="game-ui-stack-column">
          <aside class="game-panel" aria-label="Game controls">
            <p id="organization-name" class="organization-name"></p>
            <div id="game-stats" class="game-stats"></div>
            <div class="game-controls">
              <div class="game-controls-section">
                <h3 class="game-controls-heading">Plan mission</h3>
                <label class="game-field">
                  <span class="game-field-label">Mission</span>
                  <div
                    id="assign-mission-slot"
                    class="assign-pick-slot"
                    data-assign-pick="mission"
                    aria-label="Mission slot, drag a mission card here"
                  ></div>
                </label>
                <label class="game-field" id="assign-target-field">
                  <span class="game-field-label">Target</span>
                  <div
                    id="assign-target-slot"
                    class="assign-pick-slot"
                    data-assign-pick="target"
                    aria-label="Target location, drag a location card here"
                  ></div>
                </label>
                <fieldset id="assign-minions" class="game-fieldset">
                  <legend class="game-field-label">Minions (drag up to 3 from roster)</legend>
                  <div id="assign-minions-list"></div>
                </fieldset>
                <button type="button" class="btn" id="btn-assign-mission">Assign</button>
              </div>
            </div>
          </aside>
          <aside class="game-panel game-panel--activity" aria-labelledby="activity-panel-title">
            <h2 id="activity-panel-title" class="game-panel-title">Activity</h2>
            <div id="activity-panel" class="activity-panel" aria-live="polite" aria-relevant="additions text"></div>
          </aside>
        </div>
        <div class="game-ui-stack-column">
          <aside class="game-panel game-panel--omega" aria-labelledby="omega-plan-panel-title">
            <h2 id="omega-plan-panel-title" class="game-panel-title">Omega Plan</h2>
            <div id="omega-plan-panel" class="omega-plan-panel"></div>
          </aside>
          <aside class="game-panel game-panel--locations" aria-labelledby="locations-panel-title">
            <h2 id="locations-panel-title" class="game-panel-title">Locations</h2>
            <div id="locations-panel" class="locations-panel"></div>
          </aside>
        </div>
        <div class="game-ui-stack-column">
          <aside class="game-panel game-panel--minions" aria-labelledby="minions-panel-title">
            <h2 id="minions-panel-title" class="game-panel-title">Minions</h2>
            <section class="minions-panel-section" aria-label="Hired minions">
              <h3 id="minions-roster-heading" class="game-controls-heading">Your roster</h3>
              <div id="minions-roster-list" class="minions-panel-list"></div>
            </section>
            <section class="minions-panel-section" aria-label="Minions available for hire">
              <div class="minions-section-heading-row">
                <h3 id="minions-available-heading" class="game-controls-heading">Available to hire</h3>
                <button type="button" class="btn btn-reroll-hire" id="btn-reroll-hire" aria-label="Reroll hire offers for 1 CP">
                  Reroll
                </button>
              </div>
              <div id="minions-available-list" class="minions-panel-list"></div>
            </section>
          </aside>
          <aside class="game-panel game-panel--assets" aria-labelledby="assets-panel-title">
            <h2 id="assets-panel-title" class="game-panel-title">Assets</h2>
            <div id="assets-panel" class="assets-panel"></div>
          </aside>
        </div>
        <div class="game-ui-stack-column">
          <aside
            class="game-panel game-panel--active-missions"
            aria-labelledby="active-missions-panel-title"
          >
            <h2 id="active-missions-panel-title" class="game-panel-title">Active Mission</h2>
            <div id="active-missions-panel" class="active-missions-panel"></div>
          </aside>
          <aside
            class="game-panel game-panel--lair"
            aria-labelledby="lair-panel-title"
          >
            <h2 id="lair-panel-title" class="game-panel-title">Lair</h2>
            <div id="lair-panel" class="lair-panel"></div>
          </aside>
        </div>
        </div>
        <div class="game-hud">
          <div class="game-hud-left">
            <aside class="game-hud-actions-panel" aria-label="Plan actions">
              <button type="button" class="btn btn-primary" id="btn-execute-plan">Execute Plan</button>
              <button type="button" class="btn" id="btn-next-turn">Next Turn</button>
            </aside>
          </div>
          <div class="game-hud-center">
            <p class="game-hud-label" id="game-hud-short">Game</p>
          </div>
          <div class="game-hud-right">
            <button type="button" class="btn btn-hud" id="btn-pause">Pause</button>
          </div>
        </div>
        <div id="overlay-pause" class="pause-overlay" hidden aria-hidden="true">
          <div class="pause-backdrop" aria-hidden="true"></div>
          <div class="pause-panel" role="dialog" aria-modal="true" aria-labelledby="pause-heading">
            <h2 id="pause-heading" class="pause-title visually-hidden">Paused</h2>
            <div class="screen-actions pause-actions">
              <button type="button" class="btn" id="btn-pause-back">Back</button>
              <button type="button" class="btn" id="btn-pause-quit">Quit</button>
              <button type="button" class="btn" id="btn-pause-settings">Settings</button>
            </div>
          </div>
        </div>
      </section>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
